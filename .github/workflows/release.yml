name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: bhc
            asset_name: bhc-x86_64-linux

          # macOS aarch64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: bhc
            asset_name: bhc-aarch64-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18 all
          sudo apt-get install -y libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Install LLVM and dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install llvm@18 zstd
          echo "LLVM_SYS_180_PREFIX=$(brew --prefix llvm@18)" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix zstd)/lib:$LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary, RTS, and stdlib
        run: |
          # Compiler driver
          cargo build --release --target ${{ matrix.target }} -p bhc
          # RTS — required to link any compiled program
          cargo build --release --target ${{ matrix.target }} -p bhc-rts
          # Standard library static archives — without these the compiled
          # output can't satisfy putStrLn / show / etc. at link time. Every
          # stdlib crate ships a staticlib target (see stdlib/*/Cargo.toml).
          cargo build --release --target ${{ matrix.target }} \
            -p bhc-prelude \
            -p bhc-base \
            -p bhc-text \
            -p bhc-containers \
            -p bhc-transformers \
            -p bhc-numeric \
            -p bhc-concurrent \
            -p bhc-system \
            -p bhc-utils

      - name: Prepare artifact
        run: |
          mkdir -p dist/lib
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          chmod +x dist/${{ matrix.artifact_name }}
          # RTS + every stdlib static archive. The shell glob means a new
          # stdlib crate is picked up automatically as long as it ends up
          # in target/.../release/ with a libbhc_*.a name.
          cp target/${{ matrix.target }}/release/libbhc_*.a dist/lib/
          # Verify the critical ones are present so a packaging regression
          # fails the workflow instead of producing a broken artifact.
          for lib in libbhc_rts.a libbhc_text.a libbhc_base.a libbhc_prelude.a; do
            test -f "dist/lib/$lib" || { echo "Missing required library: $lib"; exit 1; }
          done
          ls -la dist/lib/
          cd dist && tar -czvf ../${{ matrix.asset_name }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sh -c '
            for f; do
              sha256sum "$f" | sed "s|  \./|  |"
            done
          ' sh {} + > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Create release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Prefer per-version notes from .github/release-notes/$VERSION.md
          # so each release can ship its own write-up without editing this
          # workflow. Falls back to a generic stub if no notes file is
          # checked in for the tagged version.
          NOTES_FILE=".github/release-notes/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" RELEASE_NOTES.md
            echo "Using $NOTES_FILE for release notes"
          else
            echo "::warning::No release notes at $NOTES_FILE; using generic stub"
            cat > RELEASE_NOTES.md << EOF
          # BHC ${VERSION}

          See [CHANGELOG.md](https://github.com/arcanist-sh/bhc/blob/main/CHANGELOG.md)
          and [the BHC blog](https://arcanist.sh/bhc/blog/) for what changed.

          ## Installation

          \`\`\`bash
          curl -fsSL https://arcanist.sh/bhc/install.sh | sh
          \`\`\`

          Or via Homebrew:

          \`\`\`bash
          brew install arcanist-sh/tap/bhc
          \`\`\`

          ## Platforms

          - Linux x86_64
          - macOS aarch64 (Apple Silicon)

          ## Checksums

          See \`SHA256SUMS.txt\`.
          EOF
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: BHC ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    # Only publish on non-prerelease tags
    if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18 all
          sudo apt-get install -y libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        run: |
          # Topologically sorted publish order based on actual dependencies
          # Each crate must have all its dependencies published before it

          # Level 0: No internal dependencies
          cargo publish -p bhc-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-arena --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-index --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-intern --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-span --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-data-structures --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-target --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45

          # Level 1: Depend only on Level 0
          cargo publish -p bhc-types --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-diagnostics --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-query --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45

          # Level 2: Depend on Level 0-1
          cargo publish -p bhc-session --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-ast --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-hir --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-lexer --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45

          # Level 3: Depend on Level 0-2
          cargo publish -p bhc-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-parser --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-linker --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45

          # Level 4: Depend on Level 0-3
          cargo publish -p bhc-tensor-ir --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-hir-to-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-codegen --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-lower --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45

          # Level 5: Depend on Level 0-4
          cargo publish -p bhc-loop-ir --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45
          cargo publish -p bhc-typeck --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45

          # Level 6: Driver (depends on most crates)
          cargo publish -p bhc-driver --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
          sleep 45

          # Level 7: CLI binary
          cargo publish -p bhc --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
        continue-on-error: true
